<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="theme-color" content="#fdf6ed" />
<title>WhiskerCache</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />

<!-- Firebase v8 compat — synchronous global, no module issues -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
/* ── TOKENS ─────────────────────────────────────────────── */
:root {
  --bg:#fdf6ed; --bg-soft:#f7ede0; --bg-card:#fffcf7;
  --border:#e8d8c4; --border-soft:#f0e4d0;
  --ink:#2c1f0e; --ink-soft:#6b4f35; --ink-faint:#a8907a; --ink-ghost:#c9b49a;
  --kevin-bg:#1a1a2e; --kevin-mid:#2e2e50; --kevin-accent:#7b9eb8; --kevin-text:#d0dce8;
  --archie-bg:#fff8ec; --archie-mid:#fef0d4; --archie-accent:#c97a0a; --archie-text:#5c3a08;
  --total-bg:#f0ebe3; --total-accent:#8a7060;
  --danger:#c0392b; --success:#4a7c59;
  --font-d:'Playfair Display',Georgia,serif; --font-b:'Nunito',sans-serif;
  --r-sm:10px; --r-md:16px; --r-lg:22px; --r-xl:30px;
  --shadow-card:0 2px 12px rgba(44,31,14,.08),0 1px 3px rgba(44,31,14,.05);
  --shadow-fab:0 4px 20px rgba(44,31,14,.28);
  --shadow-modal:0 8px 40px rgba(44,31,14,.18);
}
[data-theme="dark"] {
  --bg:#161210; --bg-soft:#1e1915; --bg-card:#201c18;
  --border:#38302a; --border-soft:#2c2520;
  --ink:#f0e8de; --ink-soft:#b8a898; --ink-faint:#7a6a5c; --ink-ghost:#4a3e35;
  --archie-bg:#2a1f0a; --archie-mid:#32260e; --archie-accent:#e8920e; --archie-text:#d4a060;
  --total-bg:#1e1a16; --total-accent:#9a8878;
  --shadow-card:0 2px 12px rgba(0,0,0,.35),0 1px 3px rgba(0,0,0,.2);
  --shadow-fab:0 4px 20px rgba(0,0,0,.5);
  --shadow-modal:0 8px 40px rgba(0,0,0,.5);
}
@media(prefers-color-scheme:dark){
  :root:not([data-theme="light"]){
    --bg:#161210; --bg-soft:#1e1915; --bg-card:#201c18;
    --border:#38302a; --border-soft:#2c2520;
    --ink:#f0e8de; --ink-soft:#b8a898; --ink-faint:#7a6a5c; --ink-ghost:#4a3e35;
    --archie-bg:#2a1f0a; --archie-mid:#32260e; --archie-accent:#e8920e; --archie-text:#d4a060;
    --total-bg:#1e1a16; --total-accent:#9a8878;
    --shadow-card:0 2px 12px rgba(0,0,0,.35),0 1px 3px rgba(0,0,0,.2);
    --shadow-fab:0 4px 20px rgba(0,0,0,.5);
    --shadow-modal:0 8px 40px rgba(0,0,0,.5);
  }
}

/* ── RESET ──────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:var(--font-b);background:var(--bg);color:var(--ink);min-height:100dvh;overflow-x:hidden;transition:background .3s,color .3s;
  background-image:radial-gradient(ellipse at 20% 10%,rgba(255,240,200,.5) 0%,transparent 60%),radial-gradient(ellipse at 80% 90%,rgba(255,220,160,.3) 0%,transparent 60%);}
button{font-family:var(--font-b);cursor:pointer}

/* ── HEADER ─────────────────────────────────────────────── */
.app-header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:rgba(253,246,237,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1.5px solid var(--border-soft);transition:background .3s}
[data-theme="dark"] .app-header{background:rgba(22,18,16,.92)}
.app-title{font-family:var(--font-d);font-size:1.55rem;font-weight:700;color:var(--ink);letter-spacing:-.02em;line-height:1.1}
.app-subtitle{font-size:.7rem;font-weight:500;color:var(--ink-faint);letter-spacing:.12em;text-transform:uppercase;font-style:italic}
.header-right{display:flex;align-items:center;gap:10px}
.theme-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg-soft);font-size:.95rem;display:flex;align-items:center;justify-content:center;transition:transform .15s,background .2s}
.theme-btn:active{transform:scale(.88)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--ink-ghost);transition:background .4s;flex-shrink:0}
.sync-dot.syncing{background:#f0a500;animation:pulse 1s infinite}
.sync-dot.synced{background:var(--success)}
.sync-dot.error{background:var(--danger)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ── MAIN / VIEWS ───────────────────────────────────────── */
.app-main{padding-bottom:calc(76px + env(safe-area-inset-bottom))}
.view{display:none;padding:20px 16px;animation:fadeIn .2s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── CARDS ──────────────────────────────────────────────── */
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.card-total{grid-column:1/-1}
.card{border-radius:var(--r-lg);padding:20px 16px;display:flex;flex-direction:column;align-items:flex-start;gap:6px;box-shadow:var(--shadow-card);border:1.5px solid transparent;transition:transform .15s}
.card:active{transform:scale(.98)}
.card-kevin{background:linear-gradient(145deg,var(--kevin-bg),var(--kevin-mid));border-color:rgba(123,158,184,.2)}
.card-archie{background:linear-gradient(145deg,var(--archie-mid),var(--archie-bg));border-color:rgba(212,130,10,.2)}
.card-total{background:linear-gradient(135deg,var(--total-bg),var(--bg-soft));border-color:var(--border);flex-direction:row;align-items:center;gap:16px}
.card-total .card-body{flex:1}
[data-theme="dark"] .card-kevin{background:linear-gradient(145deg,#0e0e1f,#1a1a38)}
[data-theme="dark"] .card-archie{background:linear-gradient(145deg,var(--archie-mid),var(--archie-bg))}
[data-theme="dark"] .card-total{background:linear-gradient(135deg,#1e1a16,#252018)}
.card-icon{font-size:1.8rem;line-height:1}
.card-label{font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.card-count{font-family:var(--font-d);font-size:2.8rem;font-weight:700;line-height:1;letter-spacing:-.03em}
.card-unit{font-size:.7rem;font-weight:500;opacity:.7}
.card-kevin .card-label{color:var(--kevin-accent)} .card-kevin .card-count{color:#fff} .card-kevin .card-unit{color:var(--kevin-text)}
.card-archie .card-label{color:var(--archie-accent)} .card-archie .card-count{color:#b35f00} .card-archie .card-unit{color:var(--archie-text)}
.card-total .card-label{color:var(--total-accent)} .card-total .card-count{color:var(--ink)} .card-total .card-unit{color:var(--ink-soft)}
[data-theme="dark"] .card-archie .card-count{color:#e8920e}
.last-find{background:var(--bg-card);border:1.5px solid var(--border-soft);border-radius:var(--r-md);padding:8px 14px;font-size:.8rem;color:var(--ink-soft);display:flex;gap:8px;align-items:center}
.last-find-lbl{font-weight:700;color:var(--ink-faint);white-space:nowrap}

/* ── FAB ────────────────────────────────────────────────── */
.fab{position:fixed;bottom:calc(68px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:200;display:flex;align-items:center;gap:8px;padding:14px 28px;background:var(--ink);color:var(--bg);font-size:.95rem;font-weight:700;letter-spacing:.02em;border:none;border-radius:50px;box-shadow:var(--shadow-fab);transition:transform .15s;white-space:nowrap}
.fab:active{transform:translateX(-50%) scale(.96)}

/* ── BOTTOM NAV ─────────────────────────────────────────── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:150;display:flex;background:rgba(253,246,237,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1.5px solid var(--border-soft);padding-bottom:env(safe-area-inset-bottom);transition:background .3s}
[data-theme="dark"] .bottom-nav{background:rgba(22,18,16,.96)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 8px;background:none;border:none;color:var(--ink-ghost);transition:color .15s}
.nav-btn.active{color:var(--ink)}
.nav-icon{font-size:1.2rem;line-height:1;transition:transform .15s}
.nav-btn.active .nav-icon{transform:scale(1.1)}
.nav-label{font-size:.63rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase}

/* ── VIEW TITLE ─────────────────────────────────────────── */
.view-title{font-family:var(--font-d);font-size:1.4rem;font-weight:600;margin-bottom:18px;color:var(--ink)}

/* ── HISTORY ────────────────────────────────────────────── */
.history-list{display:flex;flex-direction:column;gap:4px}
.date-group{margin-bottom:8px}
.date-lbl{font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);padding:6px 0 4px;border-bottom:1px solid var(--border-soft);margin-bottom:4px}
.h-entry{display:flex;align-items:center;gap:12px;background:var(--bg-card);border:1.5px solid var(--border-soft);border-radius:var(--r-md);padding:8px 12px;transition:opacity .2s}
.h-entry.deleting{opacity:.35;pointer-events:none}
.h-cat-icon{font-size:1.4rem;flex-shrink:0}
.h-body{flex:1;min-width:0}
.h-name{font-weight:700;font-size:.88rem}
.h-name.kevin{color:#3a5a7a} .h-name.archie{color:var(--archie-accent)}
[data-theme="dark"] .h-name.kevin{color:#7baed4}
.h-count{font-size:.76rem;color:var(--ink-soft)}
.h-note{font-size:.72rem;color:var(--ink-faint);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-del{background:none;border:none;color:var(--ink-ghost);font-size:.95rem;padding:6px;border-radius:8px;transition:color .15s,background .15s;flex-shrink:0}
.h-del:active{color:var(--danger);background:rgba(192,57,43,.08)}
.empty{text-align:center;color:var(--ink-faint);font-size:.9rem;padding:40px 0;font-style:italic}

/* ── STATS ──────────────────────────────────────────────── */
.stats-wrap{display:flex;flex-direction:column;gap:16px}
.stat-block{background:var(--bg-card);border:1.5px solid var(--border-soft);border-radius:var(--r-lg);padding:20px}
.stat-block-title{font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:14px}
.stat-big{font-family:var(--font-d);font-size:3rem;font-weight:700;color:var(--ink);letter-spacing:-.03em;line-height:1}
.stat-big-sub{font-size:.78rem;color:var(--ink-faint);margin-top:4px}
.cmp-wrap{margin-top:18px;display:flex;flex-direction:column;gap:10px}
.cmp-lbl{display:flex;justify-content:space-between;font-size:.76rem;font-weight:600;margin-bottom:4px}
.cmp-track{height:10px;background:var(--border-soft);border-radius:6px;overflow:hidden}
.cmp-fill{height:100%;border-radius:6px;transition:width .6s cubic-bezier(.34,1.56,.64,1)}
.cmp-fill.kevin{background:var(--kevin-accent)} .cmp-fill.archie{background:var(--archie-accent)}
.bar-chart{display:flex;flex-direction:column;gap:6px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-lbl{font-size:.7rem;font-weight:600;color:var(--ink-soft);width:52px;flex-shrink:0;text-align:right}
.bar-track{flex:1;height:18px;background:var(--border-soft);border-radius:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--archie-accent),#e8a030);transition:width .5s ease}
.bar-count{font-size:.68rem;font-weight:700;color:var(--ink);width:20px;flex-shrink:0;text-align:right}

/* ── MODAL ──────────────────────────────────────────────── */
.backdrop{position:fixed;inset:0;z-index:500;background:rgba(44,31,14,.5);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center}
.backdrop.open{display:flex}
[data-theme="dark"] .backdrop{background:rgba(0,0,0,.65)}
.modal{background:var(--bg-card);border-radius:var(--r-xl) var(--r-xl) 0 0;width:100%;max-width:480px;box-shadow:var(--shadow-modal);padding:24px 20px calc(24px + env(safe-area-inset-bottom));animation:slideUp .28s cubic-bezier(.34,1.56,.64,1)}
.modal-sm{border-radius:var(--r-lg);margin:auto 16px;max-width:360px;width:calc(100% - 32px);animation:scaleIn .2s ease}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes scaleIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.modal-title{font-family:var(--font-d);font-size:1.25rem;font-weight:600;color:var(--ink)}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--border-soft);color:var(--ink-soft);font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:background .15s}
.modal-close:hover{background:var(--border)}
.modal-body{display:flex;flex-direction:column;gap:20px}
.modal-foot{margin-top:22px}
.modal-foot-row{display:flex;gap:8px}
.form-lbl{font-size:.74rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:8px;display:block}
.cat-sel{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cat-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:16px 10px;border-radius:var(--r-md);border:2px solid var(--border);background:var(--bg-soft);transition:all .15s}
.cat-btn:active{transform:scale(.97)}
.cat-btn.sel-archie{border-color:var(--archie-accent);background:#fff8ec}
.cat-btn.sel-kevin{border-color:var(--kevin-accent);background:#f0f4f8}
[data-theme="dark"] .cat-btn.sel-archie{background:#2e2010}
[data-theme="dark"] .cat-btn.sel-kevin{background:#141828}
.cat-btn-icon{font-size:2rem}
.cat-btn-name{font-size:.8rem;font-weight:700;color:var(--ink-soft)}
.cat-btn.sel-archie .cat-btn-name,.cat-btn.sel-kevin .cat-btn-name{color:var(--ink)}
.stepper{display:flex;align-items:center;gap:14px;background:var(--bg-soft);border:1.5px solid var(--border);border-radius:var(--r-md);padding:4px 16px;align-self:flex-start}
.step-btn{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg-card);font-size:1.3rem;font-weight:600;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;transition:all .12s}
.step-btn:active{transform:scale(.92);background:var(--border-soft)}
.step-val{font-family:var(--font-d);font-size:2rem;font-weight:700;color:var(--ink);min-width:36px;text-align:center}
.note-toggle{background:none;border:none;font-size:.8rem;font-weight:600;color:var(--ink-faint);text-align:left;padding:2px 0;transition:color .15s}
.note-toggle:hover{color:var(--ink-soft)}
.note-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--bg-soft);font-family:var(--font-b);font-size:.9rem;color:var(--ink);outline:none;margin-top:8px;transition:border-color .15s}
.note-input:focus{border-color:var(--archie-accent)}
.note-input::placeholder{color:var(--ink-ghost)}
.btn-save{width:100%;padding:16px;background:var(--ink);color:var(--bg);font-size:1rem;font-weight:700;border:none;border-radius:var(--r-md);letter-spacing:.02em;transition:transform .12s}
.btn-save:active{transform:scale(.98)}
.btn-cancel{flex:1;padding:13px;background:var(--bg-soft);color:var(--ink-soft);font-size:.9rem;font-weight:600;border:1.5px solid var(--border);border-radius:var(--r-md);transition:background .12s}
.btn-cancel:hover{background:var(--border-soft)}
.btn-danger{flex:1;padding:13px;background:var(--danger);color:#fff;font-size:.9rem;font-weight:700;border:none;border-radius:var(--r-md);transition:opacity .12s}
.btn-danger:active{opacity:.85}
.del-msg{font-size:.88rem;color:var(--ink-soft);line-height:1.5}

/* ── TOAST ──────────────────────────────────────────────── */
.toast{position:fixed;bottom:calc(136px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);z-index:999;background:var(--ink);color:var(--bg);font-size:.86rem;font-weight:600;padding:10px 20px;border-radius:50px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── RESPONSIVE ─────────────────────────────────────────── */
@media(min-width:480px){
  .view{padding:24px 28px;max-width:520px;margin:0 auto}
  .app-header{padding:14px 28px}
  .modal{border-radius:var(--r-xl);margin:auto 16px;width:calc(100% - 32px)}
  .backdrop.open{align-items:center}
}
</style>
</head>
<body>

<header class="app-header">
  <div>
    <h1 class="app-title">WhiskerCache</h1>
    <p class="app-subtitle">Curated by Buns</p>
  </div>
  <div class="header-right">
    <button class="theme-btn" id="themeBtn" aria-label="Toggle dark mode">🌙</button>
    <div class="sync-dot" id="syncDot"></div>
  </div>
</header>

<main class="app-main">

  <section class="view active" id="viewHome">
    <div class="cards-grid">
      <div class="card card-kevin">
        <div class="card-icon">🐈‍⬛</div>
        <div class="card-body">
          <div class="card-label">Kevin</div>
          <div class="card-count" id="kevinCount">0</div>
          <div class="card-unit">whiskers</div>
        </div>
      </div>
      <div class="card card-archie">
        <div class="card-icon">🐈</div>
        <div class="card-body">
          <div class="card-label">Archie</div>
          <div class="card-count" id="archieCount">0</div>
          <div class="card-unit">whiskers</div>
        </div>
      </div>
      <div class="card card-total">
        <div class="card-icon">🐾</div>
        <div class="card-body">
          <div class="card-label">Total Collected</div>
          <div class="card-count" id="totalCount">0</div>
          <div class="card-unit">whiskers ever</div>
        </div>
      </div>
    </div>
    <div class="last-find" id="lastFind" style="display:none">
      <span class="last-find-lbl">Latest find:</span>
      <span id="lastFindText"></span>
    </div>
  </section>

  <section class="view" id="viewHistory">
    <div class="view-title">The Collection</div>
    <div class="history-list" id="historyList">
      <div class="empty">No whiskers logged yet. 🐱</div>
    </div>
  </section>

  <section class="view" id="viewStats">
    <div class="view-title">Stats</div>
    <div class="stats-wrap" id="statsWrap"></div>
  </section>

</main>

<button class="fab" id="fabBtn">
  <span style="font-size:1.1rem">＋</span>
  <span>Log Whisker</span>
</button>

<nav class="bottom-nav" id="bottomNav">
  <button class="nav-btn active" data-view="viewHome">
    <span class="nav-icon">🏠</span><span class="nav-label">Home</span>
  </button>
  <button class="nav-btn" data-view="viewHistory">
    <span class="nav-icon">📋</span><span class="nav-label">Collection</span>
  </button>
  <button class="nav-btn" data-view="viewStats">
    <span class="nav-icon">📊</span><span class="nav-label">Stats</span>
  </button>
</nav>

<div class="backdrop" id="logBackdrop">
  <div class="modal">
    <div class="modal-hdr">
      <h3 class="modal-title">New Find 🐾</h3>
      <button class="modal-close" id="logClose">✕</button>
    </div>
    <div class="modal-body">
      <div>
        <span class="form-lbl">Whose whisker?</span>
        <div class="cat-sel" id="catSel">
          <button class="cat-btn sel-archie" data-cat="Archie">
            <span class="cat-btn-icon">🐈</span>
            <span class="cat-btn-name">Archie</span>
          </button>
          <button class="cat-btn" data-cat="Kevin">
            <span class="cat-btn-icon">🐈‍⬛</span>
            <span class="cat-btn-name">Kevin</span>
          </button>
        </div>
      </div>
      <div>
        <span class="form-lbl">How many?</span>
        <div class="stepper">
          <button class="step-btn" id="stepMinus">−</button>
          <span class="step-val" id="stepVal">1</span>
          <button class="step-btn" id="stepPlus">+</button>
        </div>
      </div>
      <div>
        <button class="note-toggle" id="noteToggle">+ add a note</button>
        <div id="noteWrap" style="display:none">
          <input class="note-input" id="noteInput" type="text" placeholder="where'd you find it? 🔍" maxlength="120" />
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-save" id="btnSave">Secure the Whisker</button>
    </div>
  </div>

/* ── STATE ──────────────────────────────────────────────── */
var LS_E="wc_entries", LS_S="wc_seeded", LS_D="wc_deleted", LS_T="wc_theme";
var CONFIRMS=["Whisker secured. 🐾","Another one?! 😼","Into the vault!","Catalogued. Buns approves.","The collection grows… 🌟","Filed with care. ✨"];
var entries=[], deleteId=null, stepCount=1, noteShown=false, db=null, toastTimer;

/* ── LOCALSTORAGE ───────────────────────────────────────── */
function lsGet(){try{return JSON.parse(localStorage.getItem(LS_E)||"[]");}catch(e){return[];}}
function lsSave(a){try{localStorage.setItem(LS_E,JSON.stringify(a));}catch(e){}}
function lsDel(){try{return JSON.parse(localStorage.getItem(LS_D)||"[]");}catch(e){return[];}}
function lsMarkDel(id){var a=lsDel();if(a.indexOf(id)<0)a.push(id);try{localStorage.setItem(LS_D,JSON.stringify(a));}catch(e){}}

/* ── SEED ───────────────────────────────────────────────── */
function maybeSeed(){
  if(localStorage.getItem(LS_S))return;
  var ex=lsGet(), ids={};
  ex.forEach(function(e){ids[e.id]=1;});
  var add=SEED.filter(function(e){return!ids[e.id];});
  lsSave(ex.concat(add));
  localStorage.setItem(LS_S,"1");
  add.forEach(function(e){fbSave(e);});
}

/* ── MERGE ──────────────────────────────────────────────── */
function merge(local,remote){
  var del=lsDel(), map={};
  local.concat(remote).forEach(function(e){if(del.indexOf(e.id)<0)map[e.id]=e;});
  return Object.keys(map).map(function(k){return map[k];}).sort(function(a,b){return b.ts-a.ts;});
}

/* ── CRUD ───────────────────────────────────────────────── */
function addEntry(cat,count,note){
  var e={id:"wc_"+Date.now()+"_"+Math.random().toString(36).slice(2,6),ts:Date.now(),cat:cat,n:count,note:note||null};
  var local=lsGet(); local.push(e); lsSave(local);
  fbSave(e);
  entries=merge(local,[]); renderAll();
}
function removeEntry(id){
  lsMarkDel(id);
  lsSave(lsGet().filter(function(e){return e.id!==id;}));
  fbDelete(id);
  entries=entries.filter(function(e){return e.id!==id;}); renderAll();
}

/* ── FIREBASE ───────────────────────────────────────────── */
function syncDot(s){var el=document.getElementById("syncDot");if(el)el.className="sync-dot"+(s?" "+s:"");}
function initFirebase(){
  try{
    firebase.initializeApp(FB_CONFIG);
    db=firebase.firestore();
    db.enablePersistence().catch(function(){});
    syncDot("syncing");
    db.collection("whiskers").onSnapshot(function(snap){
      var remote=snap.docs.map(function(d){return d.data();});
      entries=merge(lsGet(),remote);
      lsSave(entries); renderAll(); syncDot("synced");
    },function(){syncDot("error");});
  }catch(e){console.error("Firebase init failed",e);syncDot("error");}
}
function fbSave(e){if(db)db.collection("whiskers").doc(e.id).set(e).catch(function(){});}
function fbDelete(id){if(db)db.collection("whiskers").doc(id).delete().catch(function(){});}

/* ── RENDER ─────────────────────────────────────────────── */
function renderAll(){renderCards();renderLastFind();renderHistory();renderStats();}

function renderCards(){
  var k=0,a=0;
  entries.forEach(function(e){if(e.cat==="Kevin")k+=e.n;else a+=e.n;});
  document.getElementById("kevinCount").textContent=k;
  document.getElementById("archieCount").textContent=a;
  document.getElementById("totalCount").textContent=k+a;
}

function renderLastFind(){
  var el=document.getElementById("lastFind");
  if(!entries.length){el.style.display="none";return;}
  var e=entries[0];
  document.getElementById("lastFindText").textContent=(e.cat==="Kevin"?"🐈‍⬛":"🐈")+" "+e.cat+" · "+fmtShort(e.ts)+(e.note?' · "'+e.note+'"':"");
  el.style.display="flex";
}

function renderHistory(){
  var el=document.getElementById("historyList"); el.innerHTML="";
  if(!entries.length){el.innerHTML='<div class="empty">No whiskers logged yet. 🐱</div>';return;}
  var groups={},order=[];
  entries.forEach(function(e){var k=dateKey(e.ts);if(!groups[k]){groups[k]=[];order.push(k);}groups[k].push(e);});
  order.forEach(function(k){
    var grp=groups[k], wrap=document.createElement("div"); wrap.className="date-group";
    var lbl=document.createElement("div"); lbl.className="date-lbl"; lbl.textContent=fmtFull(grp[0].ts); wrap.appendChild(lbl);
    grp.forEach(function(e){
      var row=document.createElement("div"); row.className="h-entry"; row.setAttribute("data-id",e.id);
      row.innerHTML='<div class="h-cat-icon">'+(e.cat==="Kevin"?"🐈‍⬛":"🐈")+'</div>'+
        '<div class="h-body"><div class="h-name '+(e.cat==="Kevin"?"kevin":"archie")+'">'+e.cat+'</div>'+
        '<div class="h-count">'+(e.n===1?"1 whisker":e.n+" whiskers")+'</div>'+
        (e.note?'<div class="h-note">'+esc(e.note)+'</div>':'')+
        '</div><button class="h-del" data-id="'+e.id+'" aria-label="Delete">🗑</button>';
      wrap.appendChild(row);
    });
    el.appendChild(wrap);
  });
}

function renderStats(){
  var el=document.getElementById("statsWrap");
  if(!entries.length){el.innerHTML='<div class="empty">Stats appear once you log some whiskers. 🐾</div>';return;}
  var k=0,a=0,ym={},mm={};
  entries.forEach(function(e){
    if(e.cat==="Kevin")k+=e.n;else a+=e.n;
    var dt=new Date(e.ts),yr=dt.getUTCFullYear(),mo=yr+"-"+pad(dt.getUTCMonth()+1);
    ym[yr]=(ym[yr]||0)+e.n; mm[mo]=(mm[mo]||0)+e.n;
  });
  var tot=k+a, kP=tot?Math.round(k/tot*100):50, aP=100-kP;
  var years=Object.keys(ym).sort().map(function(y){return[y,ym[y]];});
  var months=Object.keys(mm).sort().slice(-12).map(function(m){return[m,mm[m]];});
  var maxY=Math.max.apply(null,years.map(function(x){return x[1];}).concat([1]));
  var maxM=Math.max.apply(null,months.map(function(x){return x[1];}).concat([1]));
  el.innerHTML=
    '<div class="stat-block"><div class="stat-block-title">All-time totals</div>'+
    '<div class="stat-big">'+tot+'</div><div class="stat-big-sub">whiskers collected</div>'+
    '<div class="cmp-wrap">'+
      '<div><div class="cmp-lbl"><span>🐈‍⬛ Kevin</span><span>'+k+'</span></div><div class="cmp-track"><div class="cmp-fill kevin" style="width:'+kP+'%"></div></div></div>'+
      '<div><div class="cmp-lbl"><span>🐈 Archie</span><span>'+a+'</span></div><div class="cmp-track"><div class="cmp-fill archie" style="width:'+aP+'%"></div></div></div>'+
    '</div></div>'+
    '<div class="stat-block"><div class="stat-block-title">By year</div><div class="bar-chart">'+
      years.map(function(r){return'<div class="bar-row"><div class="bar-lbl">'+r[0]+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(r[1]/maxY*100)+'%"></div></div><div class="bar-count">'+r[1]+'</div></div>';}).join("")+
    '</div></div>'+
    '<div class="stat-block"><div class="stat-block-title">Recent months</div><div class="bar-chart">'+
      months.map(function(r){var p=r[0].split("-"),lbl=new Date(+p[0],+p[1]-1).toLocaleString("en-US",{month:"short",year:"2-digit"});return'<div class="bar-row"><div class="bar-lbl">'+lbl+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(r[1]/maxM*100)+'%"></div></div><div class="bar-count">'+r[1]+'</div></div>';}).join("")+
    '</div></div>';
}

/* ── MODALS ─────────────────────────────────────────────── */
function openLog(){
  stepCount=1; noteShown=false;
  document.getElementById("stepVal").textContent="1";
  document.getElementById("noteInput").value="";
  document.getElementById("noteWrap").style.display="none";
  document.getElementById("noteToggle").textContent="+ add a note";
  document.querySelectorAll(".cat-btn").forEach(function(b){b.className="cat-btn"+(b.getAttribute("data-cat")==="Archie"?" sel-archie":"");});
  document.getElementById("logBackdrop").classList.add("open");
}
function closeLog(){document.getElementById("logBackdrop").classList.remove("open");}
function saveLog(){
  var cb=document.querySelector(".cat-btn.sel-archie,.cat-btn.sel-kevin");
  addEntry(cb?cb.getAttribute("data-cat"):"Archie", stepCount, noteShown?document.getElementById("noteInput").value.trim():null);
  closeLog();
  showToast(CONFIRMS[Math.floor(Math.random()*CONFIRMS.length)]);
}
function openDel(id){deleteId=id;document.getElementById("delBackdrop").classList.add("open");}
function closeDel(){deleteId=null;document.getElementById("delBackdrop").classList.remove("open");}

/* ── TOAST ──────────────────────────────────────────────── */
function showToast(msg){
  var el=document.getElementById("toast"); el.textContent=msg; el.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(function(){el.classList.remove("show");},2600);
}

/* ── NAV ────────────────────────────────────────────────── */
function showView(id){
  document.querySelectorAll(".view").forEach(function(v){v.classList.toggle("active",v.id===id);});
  document.querySelectorAll(".nav-btn").forEach(function(b){b.classList.toggle("active",b.getAttribute("data-view")===id);});
}

/* ── THEME ──────────────────────────────────────────────── */
function applyTheme(t){
  var html=document.documentElement;
  if(t==="dark")html.setAttribute("data-theme","dark");
  else if(t==="light")html.setAttribute("data-theme","light");
  else html.removeAttribute("data-theme");
  var dark=t==="dark"||(!t&&window.matchMedia("(prefers-color-scheme:dark)").matches);
  var btn=document.getElementById("themeBtn"); if(btn)btn.textContent=dark?"☀️":"🌙";
  var m=document.querySelector('meta[name="theme-color"]'); if(m)m.content=dark?"#161210":"#fdf6ed";
}

/* ── UTILS ──────────────────────────────────────────────── */
function dateKey(ts){var d=new Date(ts);return d.getUTCFullYear()+"-"+pad(d.getUTCMonth()+1)+"-"+pad(d.getUTCDate());}
function fmtFull(ts){return new Date(ts).toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric",timeZone:"UTC"});}
function fmtShort(ts){return new Date(ts).toLocaleDateString("en-US",{year:"numeric",month:"short",day:"numeric",timeZone:"UTC"});}
function pad(n){return String(n).padStart(2,"0");}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

/* ── BOOT ───────────────────────────────────────────────── */
document.addEventListener("DOMContentLoaded",function(){

  applyTheme(localStorage.getItem(LS_T));
  document.getElementById("themeBtn").addEventListener("click",function(){
    var cur=document.documentElement.getAttribute("data-theme");
    var sys=window.matchMedia("(prefers-color-scheme:dark)").matches;
    var next=cur==="dark"?"light":cur==="light"?null:(sys?"light":"dark");
    if(next)localStorage.setItem(LS_T,next);else localStorage.removeItem(LS_T);
    applyTheme(next);
  });

  initFirebase();
  maybeSeed();
  entries=merge(lsGet(),[]); renderAll();

  document.getElementById("bottomNav").addEventListener("click",function(e){var b=e.target.closest(".nav-btn");if(b)showView(b.getAttribute("data-view"));});
  document.getElementById("fabBtn").addEventListener("click",openLog);
  document.getElementById("logClose").addEventListener("click",closeLog);
  document.getElementById("logBackdrop").addEventListener("click",function(e){if(e.target===e.currentTarget)closeLog();});
  document.getElementById("catSel").addEventListener("click",function(e){
    var b=e.target.closest(".cat-btn"); if(!b)return;
    document.querySelectorAll(".cat-btn").forEach(function(x){x.className="cat-btn";});
    b.classList.add(b.getAttribute("data-cat")==="Kevin"?"sel-kevin":"sel-archie");
  });
  document.getElementById("stepMinus").addEventListener("click",function(){if(stepCount>1){stepCount--;document.getElementById("stepVal").textContent=stepCount;}});
  document.getElementById("stepPlus").addEventListener("click",function(){if(stepCount<20){stepCount++;document.getElementById("stepVal").textContent=stepCount;}});
  document.getElementById("noteToggle").addEventListener("click",function(){
    noteShown=!noteShown;
    document.getElementById("noteWrap").style.display=noteShown?"block":"none";
    document.getElementById("noteToggle").textContent=noteShown?"− hide note":"+ add a note";
    if(noteShown)document.getElementById("noteInput").focus();
  });
  document.getElementById("btnSave").addEventListener("click",saveLog);
  document.getElementById("noteInput").addEventListener("keydown",function(e){if(e.key==="Enter")saveLog();});
  document.getElementById("delBackdrop").addEventListener("click",function(e){if(e.target===e.currentTarget)closeDel();});
  document.getElementById("btnDelCancel").addEventListener("click",closeDel);
  document.getElementById("btnDelConfirm").addEventListener("click",function(){
    if(!deleteId)return;
    var row=document.querySelector('.h-entry[data-id="'+deleteId+'"]');
    if(row)row.classList.add("deleting");
    var id=deleteId; closeDel();
    setTimeout(function(){removeEntry(id);},200);
  });
  document.getElementById("historyList").addEventListener("click",function(e){var b=e.target.closest(".h-del");if(b)openDel(b.getAttribute("data-id"));});
  document.addEventListener("keydown",function(e){if(e.key==="Escape"){closeLog();closeDel();}});

});
</script>
