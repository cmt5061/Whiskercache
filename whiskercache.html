<style>
:root{
  --bg:#fdf6ed;--bg-soft:#f7ede0;--bg-card:#fffcf7;
  --border:#e8d8c4;--border-soft:#f0e4d0;
  --ink:#2c1f0e;--ink-soft:#6b4f35;--ink-faint:#a8907a;--ink-ghost:#c9b49a;
  --kevin-bg:#1a1a2e;--kevin-mid:#2e2e50;--kevin-accent:#7b9eb8;--kevin-text:#d0dce8;
  --archie-bg:#fff8ec;--archie-mid:#fef0d4;--archie-accent:#c97a0a;--archie-text:#5c3a08;
  --total-bg:#f0ebe3;--total-accent:#8a7060;
  --danger:#c0392b;--success:#4a7c59;
  --font-d:'Playfair Display',Georgia,serif;--font-b:'Nunito',sans-serif;
  --r-sm:10px;--r-md:16px;--r-lg:22px;--r-xl:30px;
  --shadow-card:0 2px 12px rgba(44,31,14,.08),0 1px 3px rgba(44,31,14,.05);
  --shadow-fab:0 4px 20px rgba(44,31,14,.28);
  --shadow-modal:0 8px 40px rgba(44,31,14,.18);
  --nav-bg:rgba(253,246,237,.96);--hdr-bg:rgba(253,246,237,.92);
}
[data-theme="dark"]{
  --bg:#161210;--bg-soft:#1e1915;--bg-card:#201c18;
  --border:#38302a;--border-soft:#2c2520;
  --ink:#f0e8de;--ink-soft:#b8a898;--ink-faint:#9a8878;--ink-ghost:#4a3e35;
  --archie-bg:#2a1f0a;--archie-mid:#32260e;--archie-accent:#e8920e;--archie-text:#d4a060;
  --total-bg:#1e1a16;--total-accent:#9a8878;
  --shadow-card:0 2px 12px rgba(0,0,0,.4),0 1px 3px rgba(0,0,0,.25);
  --shadow-fab:0 4px 20px rgba(0,0,0,.55);
  --shadow-modal:0 8px 40px rgba(0,0,0,.55);
  --nav-bg:rgba(20,16,14,.97);--hdr-bg:rgba(20,16,14,.95);
}
@media(prefers-color-scheme:dark){
  :root:not([data-theme="light"]){
    --bg:#161210;--bg-soft:#1e1915;--bg-card:#201c18;
    --border:#38302a;--border-soft:#2c2520;
    --ink:#f0e8de;--ink-soft:#b8a898;--ink-faint:#9a8878;--ink-ghost:#4a3e35;
    --archie-bg:#2a1f0a;--archie-mid:#32260e;--archie-accent:#e8920e;--archie-text:#d4a060;
    --total-bg:#1e1a16;--total-accent:#9a8878;
    --shadow-card:0 2px 12px rgba(0,0,0,.4),0 1px 3px rgba(0,0,0,.25);
    --shadow-fab:0 4px 20px rgba(0,0,0,.55);--shadow-modal:0 8px 40px rgba(0,0,0,.55);
    --nav-bg:rgba(20,16,14,.97);--hdr-bg:rgba(20,16,14,.95);
  }
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:var(--font-b);background:var(--bg);color:var(--ink);min-height:100dvh;overflow-x:hidden;transition:background .3s,color .3s;
  background-image:radial-gradient(ellipse at 20% 10%,rgba(255,240,200,.5) 0%,transparent 60%),radial-gradient(ellipse at 80% 90%,rgba(255,220,160,.3) 0%,transparent 60%);}
[data-theme="dark"] body{background-image:radial-gradient(ellipse at 20% 10%,rgba(80,50,20,.3) 0%,transparent 60%),radial-gradient(ellipse at 80% 90%,rgba(60,35,10,.2) 0%,transparent 60%);}
button{font-family:var(--font-b);cursor:pointer}

/* HEADER */
.app-header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:8px 18px;background:var(--hdr-bg);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1.5px solid var(--border-soft);transition:background .3s,border-color .3s}
.header-left{display:flex;align-items:center;gap:10px}
.logo-img{height:52px;width:52px;object-fit:contain;flex-shrink:0}
.header-title-wrap{display:flex;flex-direction:column;gap:0}
.header-title{font-family:var(--font-d);font-size:1.45rem;font-weight:700;color:var(--ink);letter-spacing:-.02em;line-height:1.1}
.header-title-accent{color:var(--archie-accent)}
.header-right{display:flex;align-items:center;gap:10px}
.theme-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg-soft);font-size:.95rem;display:flex;align-items:center;justify-content:center;transition:transform .15s,background .2s}
.theme-btn:active{transform:scale(.88)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--ink-ghost);transition:background .4s;flex-shrink:0}
.sync-dot.syncing{background:#f0a500;animation:pulse 1s infinite}
.sync-dot.synced{background:var(--success)}.sync-dot.error{background:var(--danger)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* MAIN */
.app-main{padding-bottom:calc(76px + env(safe-area-inset-bottom))}
.view{display:none;padding:20px 16px;animation:fadeIn .2s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* CARDS */
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.card-total{grid-column:1/-1}
.card{border-radius:var(--r-lg);padding:18px 16px;display:flex;flex-direction:column;align-items:flex-start;gap:6px;box-shadow:var(--shadow-card);border:1.5px solid transparent;transition:transform .15s;cursor:pointer;position:relative;overflow:hidden}
.card:active{transform:scale(.97)}
.card-kevin{background:linear-gradient(145deg,var(--kevin-bg),var(--kevin-mid));border-color:rgba(123,158,184,.2)}
.card-archie{background:linear-gradient(145deg,var(--archie-mid),var(--archie-bg));border-color:rgba(212,130,10,.2)}
.card-total{background:linear-gradient(135deg,var(--total-bg),var(--bg-soft));border-color:var(--border);flex-direction:row;align-items:center;gap:16px;cursor:default}
.card-total .card-body{flex:1}
[data-theme="dark"] .card-kevin{background:linear-gradient(145deg,#0e0e1f,#1a1a38)}
[data-theme="dark"] .card-archie{background:linear-gradient(145deg,var(--archie-mid),var(--archie-bg))}
[data-theme="dark"] .card-total{background:linear-gradient(135deg,#1e1a16,#252018)}

/* Cards with art */
.card-kevin,.card-archie{padding:0;flex-direction:column;overflow:hidden;gap:0}
.card-art-wrap{position:relative;width:100%;height:120px;overflow:hidden;flex-shrink:0}
.card-art-img{width:100%;height:100%;object-fit:cover;object-position:center 20%;display:block;transition:transform .3s ease}
.card:active .card-art-img{transform:scale(1.04)}
.card-body{padding:10px 14px 12px;width:100%}
.cat-photo-edit{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.3);font-size:.62rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s;z-index:2;color:white}
.cat-photo-edit:active{transform:scale(.88)}
/* Old photo-wrap classes kept for compat */
.cat-photo-wrap{position:relative;width:56px;height:56px;flex-shrink:0}
.cat-photo{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.2);display:block}
.cat-emoji-fallback{font-size:2.2rem;line-height:56px;text-align:center;width:56px;height:56px;display:block}
/* Milestone sub-label on total card */
.card-milestone{font-size:.68rem;color:var(--ink-faint);margin-top:4px;font-weight:600}
/* Sync key row */
.sync-key-row{display:flex;align-items:center;gap:8px;background:var(--bg-card);border:1.5px solid var(--border-soft);border-radius:var(--r-md);padding:8px 12px;margin-top:12px;font-size:.78rem}
.sync-key-label{color:var(--ink-faint);font-weight:600;white-space:nowrap;flex-shrink:0}
.sync-key-val{font-family:monospace;font-size:.85rem;font-weight:700;color:var(--ink);letter-spacing:.12em;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sync-key-btn{background:var(--bg-soft);border:1.5px solid var(--border);border-radius:6px;padding:4px 8px;font-size:.8rem;color:var(--ink-soft);transition:background .15s;flex-shrink:0}
.sync-key-btn:hover{background:var(--border-soft)}
.card-label{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.card-count{font-family:var(--font-d);font-size:2.6rem;font-weight:700;line-height:1;letter-spacing:-.03em}
.card-unit{font-size:.68rem;font-weight:500;opacity:.7}
.card-kevin .card-label{color:var(--kevin-accent)}.card-kevin .card-count{color:#fff}.card-kevin .card-unit{color:var(--kevin-text)}
.card-archie .card-label{color:var(--archie-accent)}.card-archie .card-count{color:#b35f00}.card-archie .card-unit{color:var(--archie-text)}
.card-total .card-label{color:var(--total-accent)}.card-total .card-count{color:var(--ink)}.card-total .card-unit{color:var(--ink-soft)}
[data-theme="dark"] .card-archie .card-count{color:#e8920e}
.card-hint{position:absolute;bottom:8px;right:10px;font-size:.6rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;opacity:.4;color:inherit}
.card-kevin .card-hint,.card-archie .card-hint{color:#fff}

.last-find{background:var(--bg-card);border:1.5px solid var(--border-soft);border-radius:var(--r-md);padding:8px 14px;font-size:.8rem;color:var(--ink-soft);display:flex;gap:8px;align-items:center}
.last-find-lbl{font-weight:700;color:var(--ink-faint);white-space:nowrap}

/* FAB */

.cat-card-modal{background:transparent;border-radius:var(--r-xl) var(--r-xl) 0 0;width:100%;max-width:480px;box-shadow:none;padding:20px 20px calc(28px + env(safe-area-inset-bottom));animation:slideUp .28s cubic-bezier(.34,1.56,.64,1);overflow-y:auto;max-height:92dvh}

.mtg-ability{font-size:.75rem;color:#1a1008;line-height:1.45}
.mtg-ability b{font-weight:800}
.mtg-divider{height:1px;background:rgba(80,50,10,.2);margin:2px 0}

/* Close btn */
.cc-close-btn{margin-top:14px;width:100%;padding:14px;background:var(--ink);color:var(--bg);font-size:.95rem;font-weight:700;border:none;border-radius:var(--r-md);letter-spacing:.02em}

var LS_E="wc_entries",LS_S="wc_seeded",LS_D="wc_deleted",LS_T="wc_theme",LS_KP="wc_photo_kevin",LS_AP="wc_photo_archie",LS_MILESTONES="wc_milestones",LS_SYNC_KEY="wc_sync_key";
var CONFIRMS=["Whisker secured. 🐾","Another one?! 😼","Into the vault!","Catalogued. Buns approves.","The collection grows… 🌟","Filed with care. ✨"];
var MILESTONES=[25,50,75,100,150,200,250,300];
var entries=[],deleteId=null,stepCount=1,noteShown=false,db=null,toastTimer,syncKey="";

function lsGet(){try{return JSON.parse(localStorage.getItem(LS_E)||"[]");}catch(e){return[];}}
function lsSave(a){try{localStorage.setItem(LS_E,JSON.stringify(a));}catch(e){}}
function lsDel(){try{return JSON.parse(localStorage.getItem(LS_D)||"[]");}catch(e){return[];}}
function lsMarkDel(id){var a=lsDel();if(a.indexOf(id)<0)a.push(id);try{localStorage.setItem(LS_D,JSON.stringify(a));}catch(e){}}

function maybeSeed(){
  if(localStorage.getItem(LS_S))return;
  var ex=lsGet(),ids={};ex.forEach(function(e){ids[e.id]=1;});
  var add=SEED.filter(function(e){return!ids[e.id];});
  lsSave(ex.concat(add));localStorage.setItem(LS_S,"1");
  add.forEach(function(e){fbSave(e);});
}

function merge(local,remote){
  var del=lsDel(),map={};
  local.concat(remote).forEach(function(e){if(del.indexOf(e.id)<0)map[e.id]=e;});
  return Object.keys(map).map(function(k){return map[k];}).sort(function(a,b){return b.ts-a.ts;});
}

function totalCount(arr){var t=0;arr.forEach(function(e){t+=e.n;});return t;}

function addEntry(cat,count,note){
  var prevTotal=totalCount(entries);
  var e={id:"wc_"+Date.now()+"_"+Math.random().toString(36).slice(2,6),ts:Date.now(),cat:cat,n:count,note:note||null};
  var local=lsGet();local.push(e);lsSave(local);fbSave(e);
  entries=merge(local,[]);renderAll();
  checkMilestone(prevTotal,totalCount(entries));
}
function removeEntry(id){
  lsMarkDel(id);lsSave(lsGet().filter(function(e){return e.id!==id;}));fbDelete(id);
  entries=entries.filter(function(e){return e.id!==id;});renderAll();
}

/* MILESTONE CONFETTI */
function checkMilestone(prev,next){
  var hit=null;
  MILESTONES.forEach(function(m){if(prev<m&&next>=m)hit=m;});
  if(!hit)return;
  var seenRaw=localStorage.getItem(LS_MILESTONES);
  var seen=seenRaw?JSON.parse(seenRaw):[];
  if(seen.indexOf(hit)>=0)return;
  seen.push(hit);localStorage.setItem(LS_MILESTONES,JSON.stringify(seen));
  showConfetti();
  showToast("🎉 "+hit+" whiskers! Historic.");
}
function showConfetti(){
  var wrap=document.getElementById("confettiWrap");wrap.innerHTML="";
  var colors=["#f0a500","#c97a0a","#7b9eb8","#e8920e","#4a7c59","#c0392b","#fef0d4","#2e2e50"];
  for(var i=0;i<60;i++){
    var el=document.createElement("div");el.className="c-piece";
    el.style.left=Math.random()*100+"%";
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.width=(6+Math.random()*8)+"px";el.style.height=(6+Math.random()*8)+"px";
    el.style.borderRadius=Math.random()>0.5?"50%":"2px";
    el.style.animationDuration=(1.5+Math.random()*2)+"s";
    el.style.animationDelay=(Math.random()*0.8)+"s";
    wrap.appendChild(el);
  }
  setTimeout(function(){wrap.innerHTML="";},4000);
}

/* FIREBASE */
function syncDot(s){var el=document.getElementById("syncDot");if(el)el.className="sync-dot"+(s?" "+s:"");}

function getCollection(){return"whiskers_"+syncKey;}

function initFirebase(){
  try{
    firebase.initializeApp(FB_CONFIG);db=firebase.firestore();
    db.enablePersistence().catch(function(){});
    startListener();
  }catch(e){console.error("Firebase init failed",e);syncDot("error");}
}

var currentListener=null;
function startListener(){
  if(currentListener){currentListener();currentListener=null;}
  syncDot("syncing");
  currentListener=db.collection(getCollection()).onSnapshot(function(snap){
    var remote=snap.docs.map(function(d){return d.data();});
    entries=merge(lsGet(),remote);lsSave(entries);renderAll();syncDot("synced");
  },function(){syncDot("error");});
}

function fbSave(e){if(db)db.collection(getCollection()).doc(e.id).set(e).catch(function(){});}
function fbDelete(id){if(db)db.collection(getCollection()).doc(id).delete().catch(function(){});}

/* SYNC KEY */
function genKey(){
  var chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  var k="";for(var i=0;i<6;i++)k+=chars[Math.floor(Math.random()*chars.length)];
  return k;
}
function initSyncKey(){
  syncKey=localStorage.getItem(LS_SYNC_KEY);
  if(!syncKey){syncKey=genKey();localStorage.setItem(LS_SYNC_KEY,syncKey);}
  renderSyncKey();
}
function renderSyncKey(){
  var el=document.getElementById("syncKeyDisplay");
  if(el)el.textContent=syncKey;
}
function changeSyncKey(){
  var input=prompt("Enter a 6-character sync key to join another device,\nor leave blank to generate a new one:");
  if(input===null)return;
  var newKey=input.trim().toUpperCase().replace(/[^A-Z0-9]/g,"").slice(0,6);
  if(newKey.length>0&&newKey.length<3){showToast("Key too short — need at least 3 chars.");return;}
  if(!newKey)newKey=genKey();
  syncKey=newKey;
  localStorage.setItem(LS_SYNC_KEY,syncKey);
  // Reset local data so we pull fresh from new key
  localStorage.removeItem(LS_E);
  localStorage.removeItem(LS_S);
  localStorage.removeItem(LS_D);
  entries=[];renderAll();
  renderSyncKey();
  if(db)startListener();
  showToast("Syncing to key: "+syncKey+" 🔑");
}

/* RENDER */
function renderAll(){renderCards();renderLastFind();renderHistory();renderStats();updateLogModalPhotos();}

function renderCards(){
  var k=0,a=0;entries.forEach(function(e){if(e.cat==="Kevin")k+=e.n;else a+=e.n;});
  var tot=k+a;
  document.getElementById("kevinCount").textContent=k;
  document.getElementById("archieCount").textContent=a;
  document.getElementById("totalCount").textContent=tot;
  // Milestone countdown
  var mEl=document.getElementById("cardMilestone");
  if(mEl){
    var next=null;
    for(var i=0;i<MILESTONES.length;i++){if(MILESTONES[i]>tot){next=MILESTONES[i];break;}}
    mEl.textContent=next?"→ "+(next-tot)+" to "+next+" ✦":"All milestones reached! 🏆";
  }
}
function renderLastFind(){
  var el=document.getElementById("lastFind");
  if(!entries.length){el.style.display="none";return;}
  var e=entries[0];
  document.getElementById("lastFindText").textContent=(e.cat==="Kevin"?"🐈‍⬛":"🐈")+" "+e.cat+" · "+fmtShort(e.ts)+(e.note?' · "'+e.note+'"':"");
  el.style.display="flex";
}
function renderHistory(){
  var el=document.getElementById("historyList");el.innerHTML="";
  if(!entries.length){el.innerHTML='<div class="empty">No whiskers logged yet. 🐱</div>';return;}
  var groups={},order=[];
  entries.forEach(function(e){var k=dateKey(e.ts);if(!groups[k]){groups[k]=[];order.push(k);}groups[k].push(e);});
  order.forEach(function(k){
    var grp=groups[k],wrap=document.createElement("div");wrap.className="date-group";
    var lbl=document.createElement("div");lbl.className="date-lbl";lbl.textContent=fmtFull(grp[0].ts);wrap.appendChild(lbl);
    grp.forEach(function(e){
      var kPhoto=localStorage.getItem(LS_KP),aPhoto=localStorage.getItem(LS_AP);
      var isKevin=e.cat==="Kevin";var photo=isKevin?kPhoto:aPhoto;
      var iconHtml=photo?'<img src="'+photo+'" style="width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0"/>'
        :'<div class="h-cat-icon">'+(isKevin?"🐈‍⬛":"🐈")+'</div>';
      var row=document.createElement("div");row.className="h-entry";row.setAttribute("data-id",e.id);
      row.innerHTML=iconHtml+
        '<div class="h-body"><div class="h-name '+(isKevin?"kevin":"archie")+'">'+e.cat+'</div>'+
        '<div class="h-count">'+(e.n===1?"1 whisker":e.n+" whiskers")+'</div>'+
        (e.note?'<div class="h-note">'+esc(e.note)+'</div>':'')+
        '</div><button class="h-del" data-id="'+e.id+'" aria-label="Delete">🗑</button>';
      wrap.appendChild(row);
    });
    el.appendChild(wrap);
  });
}
function renderStats(){
  var el=document.getElementById("statsWrap");
  if(!entries.length){el.innerHTML='<div class="empty">Stats appear once you log some whiskers. 🐾</div>';return;}
  var k=0,a=0,ym={},mm={};
  entries.forEach(function(e){
    if(e.cat==="Kevin")k+=e.n;else a+=e.n;
    var dt=new Date(e.ts),yr=dt.getUTCFullYear(),mo=yr+"-"+pad(dt.getUTCMonth()+1);
    ym[yr]=(ym[yr]||0)+e.n;mm[mo]=(mm[mo]||0)+e.n;
  });
  var tot=k+a,kP=tot?Math.round(k/tot*100):50,aP=100-kP;
  var years=Object.keys(ym).sort().map(function(y){return[y,ym[y]];});
  var months=Object.keys(mm).sort().slice(-12).map(function(m){return[m,mm[m]];});
  var maxY=Math.max.apply(null,years.map(function(x){return x[1];}).concat([1]));
  var maxM=Math.max.apply(null,months.map(function(x){return x[1];}).concat([1]));
  el.innerHTML=
    '<div class="stat-block"><div class="stat-block-title">All-time totals</div>'+
    '<div class="stat-big">'+tot+'</div><div class="stat-big-sub">whiskers collected</div>'+
    '<div class="cmp-wrap">'+
      '<div><div class="cmp-lbl"><span>🐈‍⬛ Kevin</span><span>'+k+'</span></div><div class="cmp-track"><div class="cmp-fill kevin" style="width:'+kP+'%"></div></div></div>'+
      '<div><div class="cmp-lbl"><span>🐈 Archie</span><span>'+a+'</span></div><div class="cmp-track"><div class="cmp-fill archie" style="width:'+aP+'%"></div></div></div>'+
    '</div></div>'+
    '<div class="stat-block"><div class="stat-block-title">By year</div><div class="bar-chart">'+
      years.map(function(r){return'<div class="bar-row"><div class="bar-lbl">'+r[0]+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(r[1]/maxY*100)+'%"></div></div><div class="bar-count">'+r[1]+'</div></div>';}).join("")+
    '</div></div>'+
    '<div class="stat-block"><div class="stat-block-title">Recent months</div><div class="bar-chart">'+
      months.map(function(r){var p=r[0].split("-"),lbl=new Date(+p[0],+p[1]-1).toLocaleString("en-US",{month:"short",year:"2-digit"});return'<div class="bar-row"><div class="bar-lbl">'+lbl+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(r[1]/maxM*100)+'%"></div></div><div class="bar-count">'+r[1]+'</div></div>';}).join("")+
    '</div></div>';
}

/* EXPORT */
function exportCSV(){
  var rows=[["Date","Cat","Count","Note"]];
  var sorted=entries.slice().sort(function(a,b){return a.ts-b.ts;});
  sorted.forEach(function(e){rows.push([fmtFull(e.ts),e.cat,e.n,e.note||""]);});
  var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c).replace(/"/g,'""')+'"';}).join(",");}).join("\n");
  var blob=new Blob([csv],{type:"text/csv"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");a.href=url;a.download="whiskercache_export.csv";a.click();
  URL.revokeObjectURL(url);
  showToast("Exported! 📄");
}

  document.getElementById("noteWrap").style.display="none";
  document.getElementById("noteToggle").textContent="+ add a note";
  document.querySelectorAll(".cat-btn").forEach(function(b){b.className="cat-btn"+(b.getAttribute("data-cat")==="Archie"?" sel-archie":"");});
  updateLogModalPhotos();
  document.getElementById("logBackdrop").classList.add("open");
}
function closeLog(){document.getElementById("logBackdrop").classList.remove("open");}
function saveLog(){
  var cb=document.querySelector(".cat-btn.sel-archie,.cat-btn.sel-kevin");
  addEntry(cb?cb.getAttribute("data-cat"):"Archie",stepCount,noteShown?document.getElementById("noteInput").value.trim():null);
  closeLog();showToast(CONFIRMS[Math.floor(Math.random()*CONFIRMS.length)]);
}
function openDel(id){deleteId=id;document.getElementById("delBackdrop").classList.add("open");}
function closeDel(){deleteId=null;document.getElementById("delBackdrop").classList.remove("open");}

/* TOAST */
function showToast(msg){
  var el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");
  clearTimeout(toastTimer);toastTimer=setTimeout(function(){el.classList.remove("show");},2800);
}

/* NAV */
function showView(id){
  document.querySelectorAll(".view").forEach(function(v){v.classList.toggle("active",v.id===id);});
  document.querySelectorAll(".nav-btn").forEach(function(b){b.classList.toggle("active",b.getAttribute("data-view")===id);});
}

/* THEME */
function applyTheme(t){
  var html=document.documentElement;
  if(t==="dark")html.setAttribute("data-theme","dark");
  else if(t==="light")html.setAttribute("data-theme","light");
  else html.removeAttribute("data-theme");
  var dark=t==="dark"||(!t&&window.matchMedia("(prefers-color-scheme:dark)").matches);
  var btn=document.getElementById("themeBtn");if(btn)btn.textContent=dark?"☀️":"🌙";
  var m=document.getElementById("themeColorMeta");if(m)m.content=dark?"#161210":"#fdf6ed";
}

/* UTILS */
function dateKey(ts){var d=new Date(ts);return d.getUTCFullYear()+"-"+pad(d.getUTCMonth()+1)+"-"+pad(d.getUTCDate());}
function fmtFull(ts){return new Date(ts).toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric",timeZone:"UTC"});}
function fmtShort(ts){return new Date(ts).toLocaleDateString("en-US",{year:"numeric",month:"short",day:"numeric",timeZone:"UTC"});}
function pad(n){return String(n).padStart(2,"0");}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

/* BOOT */
document.addEventListener("DOMContentLoaded",function(){
  // Logo
  document.getElementById("logoImg").src=LOGO_B64;

  // Theme
  applyTheme(localStorage.getItem(LS_T));
  document.getElementById("themeBtn").addEventListener("click",function(){
    var cur=document.documentElement.getAttribute("data-theme");
    var sys=window.matchMedia("(prefers-color-scheme:dark)").matches;
    var next=cur==="dark"?"light":cur==="light"?null:(sys?"light":"dark");
    if(next)localStorage.setItem(LS_T,next);else localStorage.removeItem(LS_T);
    applyTheme(next);
  });

  // Sync key
  initSyncKey();
  document.getElementById("syncKeyCopy").addEventListener("click",function(){
    if(navigator.clipboard){navigator.clipboard.writeText(syncKey).then(function(){showToast("Key copied! 🔑");});}
    else{showToast(syncKey);}
  });
  document.getElementById("syncKeyChange").addEventListener("click",changeSyncKey);

  // Photos
  loadPhotos();

  // Firebase + seed
  initFirebase();maybeSeed();
  entries=merge(lsGet(),[]);renderAll();

  // Nav
  document.getElementById("bottomNav").addEventListener("click",function(e){var b=e.target.closest(".nav-btn");if(b)showView(b.getAttribute("data-view"));});

  // FAB
  document.getElementById("fabBtn").addEventListener("click",openLog);

  // Cat cards - click on card (not edit button)
  document.getElementById("cardKevin").addEventListener("click",function(e){
    if(e.target.closest(".cat-photo-edit")||e.target.id==="kevinFileInput")return;
    openCatCard("Kevin");
  });
  document.getElementById("cardArchie").addEventListener("click",function(e){
    if(e.target.closest(".cat-photo-edit")||e.target.id==="archieFileInput")return;
    openCatCard("Archie");
  });

  // Photo edit buttons
  document.getElementById("kevinPhotoEdit").addEventListener("click",function(e){e.stopPropagation();document.getElementById("kevinFileInput").click();});
  document.getElementById("archiePhotoEdit").addEventListener("click",function(e){e.stopPropagation();document.getElementById("archieFileInput").click();});
  document.getElementById("kevinFileInput").addEventListener("change",function(){handlePhotoUpload("kevin",this.files[0]);this.value="";});
  document.getElementById("archieFileInput").addEventListener("change",function(){handlePhotoUpload("archie",this.files[0]);this.value="";});

  // Cat card backdrop
  document.getElementById("catCardBackdrop").addEventListener("click",function(e){if(e.target===e.currentTarget)closeCatCard();});

  // Log modal
  document.getElementById("logClose").addEventListener("click",closeLog);
  document.getElementById("logBackdrop").addEventListener("click",function(e){if(e.target===e.currentTarget)closeLog();});
  document.getElementById("catSel").addEventListener("click",function(e){
    var b=e.target.closest(".cat-btn");if(!b)return;
    document.querySelectorAll(".cat-btn").forEach(function(x){x.className="cat-btn";});
    b.classList.add(b.getAttribute("data-cat")==="Kevin"?"sel-kevin":"sel-archie");
  });
  document.getElementById("stepMinus").addEventListener("click",function(){if(stepCount>1){stepCount--;document.getElementById("stepVal").textContent=stepCount;}});
  document.getElementById("stepPlus").addEventListener("click",function(){if(stepCount<20){stepCount++;document.getElementById("stepVal").textContent=stepCount;}});
  document.getElementById("noteToggle").addEventListener("click",function(){
    noteShown=!noteShown;
    document.getElementById("noteWrap").style.display=noteShown?"block":"none";
    document.getElementById("noteToggle").textContent=noteShown?"− hide note":"+ add a note";
    if(noteShown)document.getElementById("noteInput").focus();
  });
  document.getElementById("btnSave").addEventListener("click",saveLog);
  document.getElementById("noteInput").addEventListener("keydown",function(e){if(e.key==="Enter")saveLog();});

  // Delete modal
  document.getElementById("delBackdrop").addEventListener("click",function(e){if(e.target===e.currentTarget)closeDel();});
  document.getElementById("btnDelCancel").addEventListener("click",closeDel);
  document.getElementById("btnDelConfirm").addEventListener("click",function(){
    if(!deleteId)return;
    var row=document.querySelector('.h-entry[data-id="'+deleteId+'"]');if(row)row.classList.add("deleting");
    var id=deleteId;closeDel();setTimeout(function(){removeEntry(id);},200);
  });
  document.getElementById("historyList").addEventListener("click",function(e){var b=e.target.closest(".h-del");if(b)openDel(b.getAttribute("data-id"));});

  // Export
  document.getElementById("exportBtn").addEventListener("click",exportCSV);

  // ESC
  document.addEventListener("keydown",function(e){if(e.key==="Escape"){closeLog();closeDel();closeCatCard();}});
});
</script>
</body>
</html>
